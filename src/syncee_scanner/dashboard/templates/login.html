<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RB Home — Sign in</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         font:15px/1.45 system-ui,sans-serif; background:#f6f6f4; color:#222; }
  .box { background:#fff; border:1px solid #e3e3df; border-radius:12px; padding:28px 26px;
         width:320px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  h1 { font-size:17px; margin:0 0 4px; }
  p.sub { margin:0 0 18px; color:#777; font-size:13px; }
  label { display:block; font-size:12px; color:#665; margin:12px 0 4px; }
  input { width:100%; padding:9px 10px; border:1px solid #d8d8d3; border-radius:7px; font:inherit; }
  input:focus { outline:none; border-color:#2d6cdf; }
  button { width:100%; margin-top:18px; padding:10px 0; border:0; border-radius:7px;
           background:#2d6cdf; color:#fff; font:inherit; font-weight:600; cursor:pointer; }
  .err { margin-top:14px; color:#c0392b; font-size:13px; }
</style>
</head>
<body>
  <form class="box" method="post" action="/login">
    <h1>RB Home · Review</h1>
    <p class="sub">Sign in to continue</p>
    <input type="hidden" name="next" value="{{ next }}">
    <label for="u">Username</label>
    <input id="u" name="username" autocomplete="username" autofocus required>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <button type="submit">Sign in</button>
  </form>
</body>
</html>

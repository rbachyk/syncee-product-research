# Syncee Scanner — scoring configuration (spec §20, §24).
# Scoring logic lives in code + this file only, never in Baserow formulas (spec §5.5).
# Weights within each group must sum to 100.

supplier_scoring:
  version: "supplier-v1"
  reject_below: 60
  manual_review_from: 60
  approve_from: 75
  weights:
    market_coverage: 20
    shipping_speed: 20
    dispatch_proximity: 15
    data_completeness: 10
    shipping_policy: 10
    return_policy: 10
    rating: 5
    catalog_depth: 5
    approval_friction: 5

product_scoring:
  # v3: recalibrated for market (RRP) pricing. The margin criterion now reflects the ACTUAL
  # gross margin (0..1 of target) instead of a flat 1.0, so scores shifted down ~5-8 pts —
  # thresholds lowered to match, or nothing shortlists. Tune to your data: check /control's
  # review-status counts; raise these for a stricter shortlist, lower them for a wider one.
  version: "product-v3"
  reject_below: 45      # below this → Scored Rejected
  manual_review_from: 45
  shortlist_from: 55    # at/above this (and ≥ min margin) → Shortlisted
  weights:
    problem_solved: 20
    margin: 20
    shipping: 15
    content_potential: 15
    differentiation: 10
    return_risk: 10
    data_quality: 5
    supplier_strength: 5
